<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Vanilla JS Problems</title>

  <style>
v 
    body{
      font-family: Arial;
      margin:0;
    }

    .navbar{
      background:black;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    .layout{
      display:flex;
    }

    .sidebar{
      width:250px;
      background:#eee;
      padding:20px;
      height:100vh;
    }

    .main{
      flex:1;
      padding:20px;
    }

    .card{
      border:1px solid #ccc;
      padding:20px;
      margin-bottom:20px;
    }

    .hidden{
      display:none;
    }

    .dark{
      background:#111;
      color:white;
    }

    button{
      padding:8px 12px;
      margin-top:10px;
    }

    input{
      padding:10px;
      width:100%;
      margin-top:10px;
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <div>My App</div>

    <div>

      Cart:
      <span id="navbarCart">
        0
      </span>

      |

      Wishlist:
      <span id="navbarWishlist">
        0
      </span>

      |

      Notifications:
      <span id="navbarNotification">
        0
      </span>

    </div>

  </div>

  <div class="layout">

    <!-- SIDEBAR -->

    <div class="sidebar">

      <h3>Sidebar</h3>

      <p>
        Cart:
        <span id="sidebarCart">
          0
        </span>
      </p>

      <p>
        Wishlist:
        <span id="sidebarWishlist">
          0
        </span>
      </p>

      <button id="themeBtn">
        Toggle Theme
      </button>

    </div>

    <!-- MAIN -->

    <div class="main">

      <!-- PROFILE -->

      <div class="card">

        <h2 id="profileName">
          Chaitanya
        </h2>

        <button id="profileBtn">
          Change Profile
        </button>

      </div>

      <!-- CART -->

      <div class="card">

        <h2>Cart</h2>

        <button id="cartBtn">
          Add To Cart
        </button>

      </div>

      <!-- WISHLIST -->

      <div class="card">

        <h2>Wishlist</h2>

        <button id="wishlistBtn">
          Add Wishlist
        </button>

      </div>

      <!-- SEARCH -->

      <div class="card">

        <h2>Search</h2>

        <input
          type="text"
          id="searchInput"
          placeholder="Search..."
        />

        <p id="searchOutput"></p>

      </div>

      <!-- NOTIFICATIONS -->

      <div class="card">

        <h2>Notifications</h2>

        <button id="notifyBtn">
          Add Notification
        </button>

        <ul id="notificationList"></ul>

      </div>

      <!-- COMMENTS -->

      <div class="card">

        <h2>Comments</h2>

        <input
          type="text"
          id="commentInput"
          placeholder="Comment"
        />

        <button id="commentBtn">
          Add Comment
        </button>

        <ul id="commentList"></ul>

      </div>

      <!-- FILTER -->

      <div class="card">

        <h2>Filters</h2>

        <button id="filterBtn">
          Toggle Products
        </button>

        <div id="products">

          <p>Product 1</p>
          <p>Product 2</p>
          <p>Product 3</p>

        </div>

      </div>

      <!-- PAGINATION -->

      <div class="card">

        <h2>Pagination</h2>

        <button id="prevBtn">
          Prev
        </button>

        <span id="page">
          1
        </span>

        <button id="nextBtn">
          Next
        </button>

      </div>

      <!-- MESSAGES -->

      <div class="card">

        <h2>Messages</h2>

        <button id="messageBtn">
          Receive Message
        </button>

        <ul id="messageList"></ul>

      </div>

    </div>

  </div>

  <script >
    // GLOBAL VARIABLES

let cart = 0;
let wishlist = 0;
let notification = 0;
let page = 1;


// PROFILE

document
  .getElementById("profileBtn")
  .addEventListener("click", () => {

    document
      .getElementById("profileName")
      .innerText =
      "Rahul";
});



// CART

document
  .getElementById("cartBtn")
  .addEventListener("click", () => {

    cart++;

    // ONLY NAVBAR UPDATED

    document
      .getElementById("navbarCart")
      .innerText =
      cart;

    // SIDEBAR NOT UPDATED
});



// WISHLIST

document
  .getElementById("wishlistBtn")
  .addEventListener("click", () => {

    wishlist++;

    // ONLY SIDEBAR UPDATED

    document
      .getElementById("sidebarWishlist")
      .innerText =
      wishlist;

    // NAVBAR NOT UPDATED
});



// SEARCH

document
  .getElementById("searchInput")
  .addEventListener("input", (e) => {

    document
      .getElementById("searchOutput")
      .innerText =
      e.target.value;
});



// NOTIFICATION

document
  .getElementById("notifyBtn")
  .addEventListener("click", () => {

    notification++;

    // ONLY LIST UPDATED

    const li =
      document.createElement("li");

    li.innerText =
      `Notification ${notification}`;

    document
      .getElementById("notificationList")
      .appendChild(li);

    // NAVBAR COUNT NOT UPDATED
});



// COMMENTS

document
  .getElementById("commentBtn")
  .addEventListener("click", () => {

    const input =
      document.getElementById(
        "commentInput"
      );

    const li =
      document.createElement("li");

    li.innerText =
      input.value;

    document
      .getElementById("commentList")
      .appendChild(li);

    // INPUT NOT CLEARED
});



// FILTER

document
  .getElementById("filterBtn")
  .addEventListener("click", () => {

    document
      .getElementById("products")
      .classList.toggle("hidden");
});



// PAGINATION

document
  .getElementById("nextBtn")
  .addEventListener("click", () => {

    page++;

    document
      .getElementById("page")
      .innerText =
      page;
});



document
  .getElementById("prevBtn")
  .addEventListener("click", () => {

    page--;

    document
      .getElementById("page")
      .innerText =
      page;

    // NEGATIVE PAGE POSSIBLE
});



// THEME

document
  .getElementById("themeBtn")
  .addEventListener("click", () => {

    document.body
      .classList.toggle("dark");

    // SOME COMPONENTS MAY LOOK BROKEN
});



// MESSAGE

document
  .getElementById("messageBtn")
  .addEventListener("click", () => {

    const li =
      document.createElement("li");

    li.innerText =
      "New Message";

    document
      .getElementById("messageList")
      .appendChild(li);
});
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React JS - Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Comic Neue', cursive;
            background-color: #FFFDE7;
            color: #000000;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body.dark {
            background-color: #1A1A1A;
            color: #E0E0E0;
        }

        .home-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        /* Header */
        .header {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid #000;
            background-color: #FFF;
            position: relative;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        body.dark .header {
            background-color: #2A2A2A;
            border-color: #444;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 10px,
                transparent 10px,
                transparent 15px
            );
        }

        body.dark .header::after {
            background: repeating-linear-gradient(
                90deg,
                #444 0px,
                #444 10px,
                transparent 10px,
                transparent 15px
            );
        }

        .header h1 {
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            padding: 8px 16px;
            border: 3px solid #000;
            cursor: pointer;
            font-family: 'Bangers', cursive;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background-color: #FFF;
            color: #000;
            transition: all 0.3s ease;
        }

        body.dark .theme-toggle {
            background-color: #444;
            color: #FFF;
            border-color: #666;
        }

        .theme-toggle:hover {
            transform: rotate(-2deg) scale(1.05);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(0,0,0,0.02) 20px,
                rgba(0,0,0,0.02) 40px
            );
            pointer-events: none;
        }

        body.dark .hero::before {
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.01) 20px,
                rgba(255,255,255,0.01) 40px
            );
        }

        .hero-title {
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .hero-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background-color: #000;
        }

        body.dark .hero-title::after {
            background-color: #555;
        }

        .hero-subtitle {
            font-size: 0.95rem;
            max-width: 400px;
            line-height: 1.6;
            margin-top: 25px;
            margin-bottom: 30px;
        }

        .cta-button {
            padding: 14px 28px;
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 4px solid #000;
            background-color: #000;
            color: #FFF;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        body.dark .cta-button {
            border-color: #555;
            background-color: #333;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: -6px;
            bottom: -6px;
            border: 3px solid #000;
            z-index: -1;
            transition: all 0.3s ease;
        }

        body.dark .cta-button::before {
            border-color: #444;
        }

        .cta-button:hover {
            transform: rotate(-2deg) scale(1.05);
        }

        .cta-button:hover::before {
            transform: translate(-3px, -3px);
        }

        /* Footer */
        .footer {
            padding: 12px 15px;
            border-top: 6px solid #000;
            background-color: #FFF;
            text-align: center;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: all 0.4s ease;
        }

        body.dark .footer {
            background-color: #2A2A2A;
            border-color: #444;
        }

        .footer::before {
            content: '';
            display: block;
            position: relative;
            top: -18px;
            left: 0;
            right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 10px,
                transparent 10px,
                transparent 15px
            );
        }

        body.dark .footer::before {
            background: repeating-linear-gradient(
                90deg,
                #444 0px,
                #444 10px,
                transparent 10px,
                transparent 15px
            );
        }

        /* Tablet */
        @media (min-width: 768px) {
            .header {
                padding: 15px 25px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .theme-toggle {
                padding: 10px 20px;
                font-size: 1rem;
            }

            .hero {
                padding: 50px 30px;
            }

            .hero-title {
                font-size: 3rem;
            }

            .hero-subtitle {
                font-size: 1.1rem;
                max-width: 500px;
            }

            .cta-button {
                padding: 16px 35px;
                font-size: 1.3rem;
            }

            .footer {
                padding: 15px 25px;
                font-size: 0.9rem;
            }
        }

        /* Desktop */
        @media (min-width: 1024px) {
            .header {
                padding: 18px 40px;
            }

            .header h1 {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .theme-toggle {
                padding: 10px 20px;
                font-size: 1rem;
            }

            .hero {
                padding: 60px 40px;
            }

            .hero-title {
                font-size: 4rem;
                letter-spacing: 5px;
            }

            .hero-title::after {
                width: 200px;
                height: 6px;
            }

            .hero-subtitle {
                font-size: 1.3rem;
                max-width: 600px;
                margin-top: 30px;
                margin-bottom: 40px;
            }

            .cta-button {
                padding: 18px 40px;
                font-size: 1.5rem;
                letter-spacing: 3px;
            }

            .cta-button::before {
                top: 8px;
                left: 8px;
                right: -8px;
                bottom: -8px;
            }

            .footer {
                padding: 20px 40px;
                font-size: 1rem;
                letter-spacing: 2px;
            }

            .footer::before {
                top: -26px;
            }
        }

        /* Large Desktop */
        @media (min-width: 1441px) {
            .hero-title {
                font-size: 5rem;
            }

            .hero-subtitle {
                font-size: 1.4rem;
                max-width: 700px;
            }

            .cta-button {
                padding: 20px 50px;
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="home-container">
        <header class="header">
            <h1>React JS Docs</h1>
            <button class="theme-toggle" onclick="toggleTheme()">DARK MODE</button>
        </header>

        <section class="hero">
            <h2 class="hero-title">Learn React JS</h2>
            <p class="hero-subtitle">
                Master the art of building modern user interfaces with React. 
                From basics to advanced concepts, our comprehensive documentation 
                will guide you through every step of your journey.
            </p>
            <a href="React_Documentation.html" class="cta-button">Get Started</a>
        </section>

        <footer class="footer">
            React JS Documentation - Comic Book Edition
        </footer>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = 'LIGHT MODE';
            } else {
                btn.textContent = 'DARK MODE';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React JS - Home</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .home-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .header {
            /* styles inherited from theme.css */
        }

        .header h1 {
            font-size: 1.2rem;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(0,0,0,0.02) 20px,
                rgba(0,0,0,0.02) 40px
            );
            pointer-events: none;
        }

        body.dark .hero::before {
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.01) 20px,
                rgba(255,255,255,0.01) 40px
            );
        }

        .hero-title {
            font-size: 2rem;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .hero-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background-color: #000;
        }

        body.dark .hero-title::after {
            background-color: #555;
        }

        .hero-subtitle {
            font-size: 0.95rem;
            max-width: 400px;
            line-height: 1.6;
            margin-top: 25px;
            margin-bottom: 30px;
        }

        .footer {
            border-top: 6px solid #000;
            text-align: center;
            font-size: 0.8rem;
        }

        .footer::before {
            content: '';
            display: block;
            position: relative;
            top: -18px;
            left: 0;
            right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 10px,
                transparent 10px,
                transparent 15px
            );
        }

        body.dark .footer::before {
            background: repeating-linear-gradient(
                90deg,
                #444 0px,
                #444 10px,
                transparent 10px,
                transparent 15px
            );
        }

        /* Tablet */
        @media (min-width: 768px) {
            .header {
                padding: 15px 25px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .hero {
                padding: 50px 30px;
            }

            .hero-title {
                font-size: 3rem;
            }

            .hero-subtitle {
                font-size: 1.1rem;
                max-width: 500px;
            }

            .footer {
                padding: 15px 25px;
                font-size: 0.9rem;
            }
        }

        /* Desktop */
        @media (min-width: 1024px) {
            .header {
                padding: 18px 40px;
            }

            .header h1 {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .hero {
                padding: 60px 40px;
            }

            .hero-title {
                font-size: 4rem;
                letter-spacing: 5px;
            }

            .hero-title::after {
                width: 200px;
                height: 6px;
            }

            .hero-subtitle {
                font-size: 1.3rem;
                max-width: 600px;
                margin-top: 30px;
                margin-bottom: 40px;
            }

            .footer {
                padding: 20px 40px;
                font-size: 1rem;
                letter-spacing: 2px;
            }

            .footer::before {
                top: -26px;
            }
        }

        /* Large Desktop */
        @media (min-width: 1441px) {
            .hero-title {
                font-size: 5rem;
            }

            .hero-subtitle {
                font-size: 1.4rem;
                max-width: 700px;
            }
        }
    </style>
</head>
<body>
    <div class="home-container">
        <header class="header comic-header">
            <h1 class="comic-title">React JS Docs</h1>
            <button class="comic-btn comic-btn-secondary" onclick="toggleTheme()">DARK MODE</button>
        </header>

        <section class="hero">
            <h2 class="hero-title comic-title">Learn React JS</h2>
            <p class="hero-subtitle">
                Master the art of building modern user interfaces with React. 
                From basics to advanced concepts, our comprehensive documentation 
                will guide you through every step of your journey.
            </p>
            <a href="React_Documentation.html" class="comic-btn comic-btn-primary">Get Started</a>
        </section>

        <footer class="footer comic-text">
            React JS Documentation - Comic Book Edition
        </footer>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.comic-btn-secondary');
            if (document.body.classList.contains('dark')) {
                btn.textContent = 'LIGHT MODE';
            } else {
                btn.textContent = 'DARK MODE';
            }
        }
    </script>
</body>
</html>

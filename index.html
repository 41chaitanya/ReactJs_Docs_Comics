<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React JS - Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Comic Neue', cursive;
            background-color: #FFFDE7;
            color: #000000;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark {
            background-color: #1A1A1A;
            color: #E0E0E0;
        }

        .home-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        /* Header */
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid #000;
            background-color: #FFF;
            position: relative;
        }

        body.dark .header {
            background-color: #2A2A2A;
            border-color: #444;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 10px,
                transparent 10px,
                transparent 15px
            );
        }

        body.dark .header::after {
            background: repeating-linear-gradient(
                90deg,
                #444 0px,
                #444 10px,
                transparent 10px,
                transparent 15px
            );
        }

        .header h1 {
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .theme-toggle {
            padding: 10px 20px;
            border: 4px solid #000;
            cursor: pointer;
            font-family: 'Bangers', cursive;
            font-size: 1rem;
            letter-spacing: 1px;
            background-color: #FFF;
            color: #000;
            transition: all 0.2s;
        }

        body.dark .theme-toggle {
            background-color: #444;
            color: #FFF;
            border-color: #666;
        }

        .theme-toggle:hover,
        .cta-button:hover,
        .back-button:hover {
            transform: rotate(-2deg) scale(1.05);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(0,0,0,0.02) 20px,
                rgba(0,0,0,0.02) 40px
            );
            pointer-events: none;
        }

        body.dark .hero::before {
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.01) 20px,
                rgba(255,255,255,0.01) 40px
            );
        }

        .hero-title {
            font-family: 'Bangers', cursive;
            font-size: 4rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .hero-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background-color: #000;
        }

        body.dark .hero-title::after {
            background-color: #555;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            max-width: 600px;
            line-height: 1.8;
            margin-top: 30px;
            margin-bottom: 40px;
        }

        .cta-button {
            padding: 18px 40px;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 5px solid #000;
            background-color: #000;
            color: #FFF;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            text-decoration: none;
        }

        body.dark .cta-button {
            border-color: #555;
            background-color: #333;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: -8px;
            bottom: -8px;
            border: 4px solid #000;
            z-index: -1;
        }

        body.dark .cta-button::before {
            border-color: #444;
        }

        .cta-button::before {
            transition: all 0.2s;
        }

        .cta-button:hover::before {
            transform: translate(-4px, -4px);
        }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .feature-box {
            padding: 25px;
            border: 4px solid #000;
            background-color: #FFF;
            position: relative;
            transition: all 0.3s;
        }

        body.dark .feature-box {
            background-color: #2A2A2A;
            border-color: #555;
        }

        .feature-box::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: -6px;
            bottom: -6px;
            border: 3px solid #000;
            z-index: -1;
        }

        body.dark .feature-box::before {
            border-color: #444;
        }

        .feature-box h3 {
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .feature-box p {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            padding: 20px 40px;
            border-top: 6px solid #000;
            background-color: #FFF;
            text-align: center;
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
        }

        body.dark .footer {
            background-color: #2A2A2A;
            border-color: #444;
        }

        .footer::before {
            content: '';
            display: block;
            position: relative;
            top: -26px;
            left: 0;
            right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 10px,
                transparent 10px,
                transparent 15px
            );
        }

        body.dark .footer::before {
            background: repeating-linear-gradient(
                90deg,
                #444 0px,
                #444 10px,
                transparent 10px,
                transparent 15px
            );
        }
    </style>
</head>
<body>
    <div class="home-container">
        <header class="header">
            <h1>React JS Docs</h1>
            <button class="theme-toggle" onclick="toggleTheme()">DARK MODE</button>
        </header>

        <section class="hero">
            <h2 class="hero-title">Learn React JS</h2>
            <p class="hero-subtitle">
                Master the art of building modern user interfaces with React. 
                From basics to advanced concepts, our comprehensive documentation 
                will guide you through every step of your journey.
            </p>
            <a href="React_Documentation.html" class="cta-button">Get Started</a>
        </section>

        <footer class="footer">
            React JS Documentation - Comic Book Edition
        </footer>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = 'LIGHT MODE';
            } else {
                btn.textContent = 'DARK MODE';
            }
        }
    </script>
</body>
</html>
